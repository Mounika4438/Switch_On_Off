<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="switchoffon.css" rel="stylesheet">
    <title>Bulb Switch</title>
</head>
<body>

    <div class="container">
        <h1 class="title">Bulb Switch Board</h1>

        <div class="bulb">
            <img id="bulb" src="bulbon.png">
        </div>

        <div class="cat">
            <img id="cat" src="cat.png">
        </div>

        <div class="onoff">
            <p id="status">Switched On</p>
            <div class="buttons">
                <button id="on">ON</button>
                <button id="off">OFF</button>
            </div>
        </div>
    </div>

    <script src="switchoffon.js"></script>
</body>
</html>
